<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corriente Sound</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@500&family=Spectral:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #C8A882;
            --bg-dark:   #B8936A;
            --card:      rgba(237, 218, 188, 0.88);
            --card-deep: rgba(224, 200, 165, 0.92);
            --ink:       #2C1A0E;
            --ink-mid:   #5C3A22;
            --ink-light: #8B6040;
            --rule:      rgba(92, 58, 34, 0.25);
            --accent:    #1A6B50;
            --accent-h:  #145840;
            --rose:      #B83860;
            --rose-h:    #9A2A50;
            --tag-up:    rgba(180, 80, 20, 0.18);
            --tag-chill: rgba(26, 107, 80, 0.18);
            --tag-gr:    rgba(26, 107, 80, 0.18);
            --tag-rom:   rgba(184, 56, 96, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Spectral', Georgia, serif;
            background: linear-gradient(160deg, #C8A882 0%, #B8936A 60%, #A07848 100%);
            min-height: 100vh;
            color: var(--ink);
            padding: 20px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 40px; }

        .logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--ink);
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .subtitle {
            font-family: 'DM Mono', monospace;
            color: var(--ink-mid);
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* ── cards ── */
        .auth-section,
        .search-section,
        .mood-section,
        .playlist-section {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid var(--rule);
            box-shadow: 0 2px 12px rgba(44, 26, 14, 0.10);
        }

        .auth-section.hidden  { display: none; }
        .search-section.hidden { display: none; }
        .mood-section.show    { display: block; }
        .mood-section         { display: none; }
        .playlist-section.show { display: block; }
        .playlist-section      { display: none; }

        /* ── spotify button ── */
        .spotify-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 13px 28px;
            background: #1db954;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: background-color 0.2s;
            border: none;
            cursor: pointer;
        }
        .spotify-btn:hover { background: #1aa34a; }

        /* ── search input ── */
        .search-input {
            width: 100%;
            padding: 13px 18px;
            font-size: 1rem;
            font-family: 'Spectral', Georgia, serif;
            border: 1.5px solid var(--rule);
            border-radius: 10px;
            background: rgba(255, 245, 230, 0.7);
            color: var(--ink);
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        .search-input:focus { outline: none; border-color: var(--accent); }
        .search-input::placeholder { color: var(--ink-light); }

        /* ── search results ── */
        .search-results { display: none; max-height: 300px; overflow-y: auto; }
        .search-results.show { display: block; }

        /* ── selected song ── */
        .selected-song {
            display: none;
            background: var(--card-deep);
            padding: 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid var(--accent);
        }
        .selected-song.show { display: block; }

        .song-info { display: flex; align-items: center; gap: 15px; }

        .song-artwork { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }

        .song-artwork-placeholder {
            width: 60px; height: 60px;
            background: linear-gradient(45deg, var(--accent), var(--rose));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
        }

        .song-details h3 { font-family: 'Playfair Display', serif; font-size: 1.15rem; margin-bottom: 4px; }
        .song-details p  { color: var(--ink-mid); font-size: 0.88rem; }

        /* ── play button ── */
        .play-btn {
            padding: 10px 14px;
            background: linear-gradient(45deg, var(--accent), var(--rose));
            border: none; border-radius: 8px;
            color: white; font-size: 1rem; cursor: pointer;
            transition: transform 0.2s; min-width: 48px;
        }
        .play-btn:hover { transform: scale(1.05); }
        .play-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        /* ── similar songs ── */
        .similar-songs-list { display: flex; flex-direction: column; gap: 8px; }

        .similar-song-item {
            display: flex; align-items: center;
            padding: 11px 12px;
            background: var(--card-deep);
            border-radius: 8px; margin-bottom: 8px;
            transition: all 0.25s; cursor: pointer;
            border: 1.5px solid transparent;
        }
        .similar-song-item:hover {
            background: rgba(220, 195, 158, 0.95);
            border-color: var(--rose);
            transform: translateX(4px);
        }

        .similar-rank {
            width: 24px; height: 24px;
            background: linear-gradient(45deg, var(--rose), var(--accent));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 0.78rem;
            margin-right: 12px; flex-shrink: 0;
        }

        .similarity-score {
            color: var(--rose); font-size: 0.75rem; font-weight: 600;
            margin-left: auto; display: flex; align-items: center; gap: 4px;
        }

        .strategy-tag {
            background: rgba(184, 56, 96, 0.15);
            color: var(--rose);
            padding: 2px 6px; border-radius: 4px;
            font-family: 'DM Mono', monospace; font-size: 0.6rem;
            margin-top: 2px;
        }

        /* ── audio features debug ── */
        .audio-features-debug {
            display: none;
            background: rgba(255, 245, 225, 0.6);
            border: 1px solid var(--rule);
            border-radius: 8px; padding: 15px; margin-top: 15px;
            font-family: 'DM Mono', monospace;
        }
        .audio-features-debug.show { display: block; }

        /* ── similar song section ── */
        .similar-song-section {
            display: none;
            background: rgba(224, 200, 165, 0.6);
            border: 1px solid rgba(184, 56, 96, 0.25);
            border-radius: 12px; padding: 20px; margin-top: 20px;
        }
        .similar-song-section.show { display: block; }

        .similar-song-header {
            font-family: 'Playfair Display', serif;
            color: var(--rose); font-weight: 700;
            margin-bottom: 14px; font-size: 1rem;
            display: flex; align-items: center; gap: 10px;
        }

        .pipeline-info {
            font-size: 0.78rem; color: var(--ink-light);
            margin-top: 10px; font-style: italic;
        }

        .test-btn {
            padding: 8px 16px;
            background: linear-gradient(45deg, var(--rose), var(--accent));
            border: none; border-radius: 6px;
            color: white; font-size: 0.88rem; cursor: pointer;
            transition: transform 0.2s;
        }
        .test-btn:hover { transform: scale(1.04); }

        /* ── debug header / feature grid ── */
        .debug-header {
            font-family: 'DM Mono', monospace;
            color: var(--accent); font-weight: bold;
            margin-bottom: 10px; font-size: 0.85rem;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 8px; font-size: 0.78rem;
        }

        .feature-item {
            background: rgba(255, 245, 225, 0.5);
            padding: 8px; border-radius: 6px;
            display: flex; justify-content: space-between;
        }
        .feature-name  { color: var(--ink-mid); }
        .feature-value { color: var(--accent); font-weight: bold; }

        /* ── mood section ── */
        .mood-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem; margin-bottom: 8px; text-align: center;
        }

        .mood-subtitle { color: var(--ink-mid); text-align: center; margin-bottom: 25px; }

        .mood-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px; margin-bottom: 25px;
        }

        .mood-btn {
            padding: 18px;
            border: 1.5px solid var(--rule);
            border-radius: 12px;
            background: rgba(255, 245, 230, 0.55);
            color: var(--ink);
            cursor: pointer; transition: all 0.25s;
            text-align: center; font-size: 0.95rem; font-weight: 500;
        }
        .mood-btn:hover { border-color: var(--accent); transform: translateY(-2px); background: rgba(255, 245, 230, 0.85); }
        .mood-btn.selected {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 8px 18px rgba(26, 107, 80, 0.28);
        }

        .mood-icon { font-size: 2rem; margin-bottom: 8px; display: block; }

        /* ── generate button ── */
        .generate-btn {
            display: none; width: 100%; padding: 14px;
            background: linear-gradient(90deg, var(--accent), var(--rose));
            border: none; border-radius: 12px;
            color: white; font-size: 1.05rem; font-weight: 600;
            cursor: pointer; transition: transform 0.25s;
        }
        .generate-btn.show { display: block; }
        .generate-btn:hover { transform: translateY(-2px); }

        /* ── playlist ── */
        .playlist-header { text-align: center; margin-bottom: 25px; }

        .playlist-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem; margin-bottom: 8px;
        }

        .playlist-meta { color: var(--ink-mid); font-size: 0.88rem; }

        .playlist-tracks { display: flex; flex-direction: column; gap: 10px; }

        .track-item {
            display: flex; align-items: center;
            padding: 14px;
            background: var(--card-deep);
            border-radius: 10px; margin-bottom: 8px;
            transition: background-color 0.2s; cursor: pointer;
            border: 1px solid transparent;
        }
        .track-item:hover { background: rgba(220, 195, 155, 0.95); border-color: var(--rule); }

        .track-number { width: 28px; color: var(--ink-light); font-size: 0.88rem; font-family: 'DM Mono', monospace; }

        .track-artwork { width: 40px; height: 40px; border-radius: 6px; margin-right: 14px; object-fit: cover; }

        .track-artwork-placeholder {
            width: 40px; height: 40px;
            background: rgba(92, 58, 34, 0.18);
            border-radius: 6px; margin-right: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem;
        }

        .track-info { flex: 1; }
        .track-title  { font-weight: 600; margin-bottom: 3px; }
        .track-artist { color: var(--ink-mid); font-size: 0.88rem; }

        /* ── mood tags ── */
        .mood-tag { padding: 3px 8px; border-radius: 10px; font-size: 0.68rem; font-weight: 600; margin-left: 10px; font-family: 'DM Mono', monospace; }
        .mood-upbeat  { background: var(--tag-up);   color: #B45010; }
        .mood-chill   { background: var(--tag-chill); color: var(--accent); }
        .mood-groovy  { background: var(--tag-gr);    color: var(--accent); }
        .mood-romantic { background: var(--tag-rom);  color: var(--rose); }

        /* ── loading / error ── */
        .loading { display: none; text-align: center; padding: 20px; color: var(--ink-mid); }
        .loading.show { display: block; }

        .error {
            background: rgba(184, 56, 96, 0.12);
            border: 1px solid rgba(184, 56, 96, 0.4);
            padding: 14px; border-radius: 8px;
            margin-bottom: 20px; display: none;
        }
        .error.show { display: block; }

        /* ── service status (hidden by default, kept for compat) ── */
        .service-status {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--card);
            padding: 12px; border-radius: 8px;
            font-size: 0.78rem; color: var(--ink-mid);
            border: 1px solid var(--rule); z-index: 1000;
        }
        .service-status .status-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .service-status .status-item:last-child { margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="logo">Corriente Sound</h1>
            <p class="subtitle">Play your Current</p>
        </div>

        <!-- Authentication happens automatically on load -->

        <!-- Error Display -->
        <div class="error" id="errorDisplay"></div>

        <!-- Loading Indicator -->
        <div class="loading" id="loadingIndicator">
            <div style="font-size: 2rem; margin-bottom: 10px;">🎵</div>
            <p>Loading...</p>
        </div>

        <!-- Song Search Section -->
        <div class="search-section hidden" id="searchSection">
            <h2 style="margin-bottom: 15px; text-align: center;">Start with a song you love</h2>
            <input 
                type="text" 
                class="search-input" 
                id="songSearch"
                placeholder="Search for any song on Spotify..."
            >
            
            <!-- Real Spotify search results -->
            <div id="searchResults" class="search-results"></div>

            <!-- Selected Song Display -->
            <div class="selected-song" id="selectedSong">
                <div class="song-info">
                    <img id="selectedArtwork" class="song-artwork" style="display: none;" />
                    <div class="song-artwork-placeholder" id="artworkPlaceholder">🎵</div>
                    <div class="song-details">
                        <h3 id="selectedTitle">Song Title</h3>
                        <p id="selectedArtist">Artist Name</p>
                        <p id="selectedAlbum" style="font-size: 0.8rem; color: var(--ink-light);"></p>
                    </div>
                    <button class="play-btn" id="playBtn" onclick="togglePlay()">
                        <span id="playIcon">▶️</span>
                    </button>
                </div>
                <div id="spotifyEmbed" style="display:none; margin-top: 12px;">
                    <iframe id="spotifyIframe"
                        style="border-radius: 10px; width: 100%; height: 80px;"
                        frameborder="0"
                        allowtransparency="true"
                        allow="encrypted-media">
                    </iframe>
                </div>
            </div>
        </div>

        <!-- Mood Selection Section -->
        <div class="mood-section" id="moodSection">
            <h2 class="mood-title">Where should we take this playlist?</h2>
            <p class="mood-subtitle">Select the mood directions you want to explore</p>
            
            <div class="mood-buttons">
                <button class="mood-btn" onclick="toggleMood(this, 'upbeat')">
                    <span class="mood-icon">⚡</span>
                    More Upbeat
                </button>
                <button class="mood-btn" onclick="toggleMood(this, 'chill')">
                    <span class="mood-icon">🌊</span>
                    More Chill
                </button>
                <button class="mood-btn" onclick="toggleMood(this, 'groovy')">
                    <span class="mood-icon">🕺</span>
                    More Groovy
                </button>
                <button class="mood-btn" onclick="toggleMood(this, 'romantic')">
                    <span class="mood-icon">💕</span>
                    More Romantic
                </button>
            </div>

            <button class="generate-btn" id="generateBtn" onclick="generatePlaylist()">
                🎯 Generate My Corriente Playlist
            </button>
        </div>

        <!-- Generated Playlist Section -->
        <div class="playlist-section" id="playlistSection">
            <div class="playlist-header">
                <h2 class="playlist-title">Your Corriente Playlist</h2>
                <p class="playlist-meta" id="playlistMeta">Generating...</p>
            </div>

            <div class="playlist-tracks" id="playlistTracks">
                <!-- Real Spotify tracks will be populated here -->
            </div>
        </div>
    </div>


    <script>
        // API Configuration - Now points to our backend with ReccoBeats integration
        const API_BASE = window.location.origin.includes('localhost') ? 
            'http://localhost:3001/api' : '/api';

        let isAuthenticated = false;
        let selectedMoods = [];
        let currentSong = null;
        let searchTimeout = null;

        // Enhanced error handling for ReccoBeats integration
        function showError(message, details = null) {
            const errorDiv = document.getElementById('errorDisplay');
            
            // Enhanced error messages for better user experience
            let displayMessage = message;
            
            if (message.includes('Failed to get audio features')) {
                displayMessage = 'Unable to analyze this song\'s mood characteristics. Please try a different track.';
            } else if (message.includes('Failed to generate recommendations')) {
                displayMessage = 'Could not generate playlist recommendations. Please try again with a different song.';
            } else if (message.includes('Search failed')) {
                displayMessage = 'Song search is temporarily unavailable. Please try again.';
            }
            
            errorDiv.textContent = displayMessage;
            errorDiv.classList.add('show');
            
            // Log detailed error for debugging
            if (details) {
                console.error('Detailed error:', details);
            }
            
            // Auto-hide after 7 seconds (longer for integration issues)
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 7000);
        }

        async function authenticateSpotify() {
            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/auth`, { method: 'POST' });
                if (!response.ok) throw new Error('Authentication failed');
                const data = await response.json();
                if (data.success) {
                    isAuthenticated = true;
                    document.getElementById('searchSection').classList.remove('hidden');
                } else {
                    throw new Error(data.error || 'Authentication failed');
                }
            } catch (error) {
                showError('Could not connect to Spotify. Please refresh and try again.');
            }
            showLoading(false);
        }

        // Search for songs via backend (Spotify)
        async function searchSpotify(query) {
            if (!isAuthenticated) {
                showError('Not authenticated with music services');
                return [];
            }

            try {
                const response = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}`);

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || 'Search request failed');
                }

                const tracks = await response.json();
                return tracks;
            } catch (error) {
                showError('Search failed: ' + error.message);
                return [];
            }
        }

        async function getRecommendations(seedTrackId, moods) {
            try {
                const queryParams = new URLSearchParams({
                    seed_tracks: seedTrackId,
                    moods: moods.join(','),
                    limit: 9,
                });
                const response = await fetch(`${API_BASE}/recommendations?${queryParams}`);
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || 'Failed to get recommendations');
                }
                const tracks = await response.json();
                if (!Array.isArray(tracks) || tracks.length === 0) {
                    console.warn('No recommendations returned');
                    return [];
                }
                console.log(`✅ Got ${tracks.length} recommendations`);
                return tracks;
            } catch (error) {
                console.error('Recommendations error:', error);
                showError('Failed to generate playlist: ' + error.message);
                return [];
            }
        }

        // Initialize search functionality
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('songSearch');
            
            searchInput.addEventListener('input', function(e) {
                const query = e.target.value.trim();
                
                // Clear previous timeout
                if (searchTimeout) {
                    clearTimeout(searchTimeout);
                }
                
                if (query.length > 2) {
                    // Debounce search
                    searchTimeout = setTimeout(() => {
                        performSearch(query);
                    }, 500);
                } else {
                    document.getElementById('searchResults').classList.remove('show');
                }
            });
        });

        async function performSearch(query) {
            showLoading(true);
            
            const tracks = await searchSpotify(query);
            const resultsDiv = document.getElementById('searchResults');
            
            if (tracks && tracks.length > 0) {
                resultsDiv.innerHTML = '';
                
                tracks.forEach((track, index) => {
                    const trackDiv = document.createElement('div');
                    trackDiv.className = 'track-item';
                    trackDiv.onclick = () => selectSong(track);
                    
                    const artwork = track.album.images.length > 0 ? 
                        `<img src="${track.album.images[2]?.url || track.album.images[0]?.url}" class="track-artwork" />` :
                        `<div class="track-artwork-placeholder">🎵</div>`;
                    
                    // Add preview indicator
                    const previewIndicator = track.preview_url ? 
                        '<span style="color: var(--accent); font-size: 0.8rem;">▶️ Preview</span>' :
                        '<span style="color: var(--ink-light); font-size: 0.8rem;">No preview</span>';
                    
                    trackDiv.innerHTML = `
                        <span class="track-number">🎵</span>
                        ${artwork}
                        <div class="track-info">
                            <div class="track-title">${track.name}</div>
                            <div class="track-artist">${track.artists[0].name}</div>
                            <div>${previewIndicator}</div>
                        </div>
                    `;
                    
                    resultsDiv.appendChild(trackDiv);
                });
                
                resultsDiv.classList.add('show');
            }
            
            showLoading(false);
        }

        function selectSong(track) {
            currentSong = track;

            // Reset embed if showing
            document.getElementById('spotifyEmbed').style.display = 'none';
            document.getElementById('spotifyIframe').src = '';
            updatePlayButton(false);

            // Update selected song display
            document.getElementById('selectedTitle').textContent = track.name;
            document.getElementById('selectedArtist').textContent = track.artists[0].name;
            document.getElementById('selectedAlbum').textContent = track.album.name;

            // Update artwork
            const artworkImg = document.getElementById('selectedArtwork');
            const artworkPlaceholder = document.getElementById('artworkPlaceholder');
            if (track.album.images.length > 0) {
                artworkImg.src = track.album.images[1]?.url || track.album.images[0]?.url;
                artworkImg.style.display = 'block';
                artworkPlaceholder.style.display = 'none';
            }

            // Play button always enabled — uses Spotify embed
            const playBtn = document.getElementById('playBtn');
            playBtn.disabled = false;
            playBtn.style.opacity = '1';

            document.getElementById('selectedSong').classList.add('show');
            document.getElementById('searchResults').classList.remove('show');

            // Show mood section immediately — no API call needed here
            document.getElementById('moodSection').classList.add('show');
            document.getElementById('moodSection').scrollIntoView({ behavior: 'smooth' });
        }

        function toggleMood(button, moodType) {
            if (button.classList.contains('selected')) {
                button.classList.remove('selected');
                selectedMoods = selectedMoods.filter(m => m !== moodType);
            } else {
                button.classList.add('selected');
                selectedMoods.push(moodType);
            }

            // Show generate button if any mood is selected
            const generateBtn = document.getElementById('generateBtn');
            if (selectedMoods.length > 0) {
                generateBtn.classList.add('show');
            } else {
                generateBtn.classList.remove('show');
            }
        }

        // Enhanced playlist generation with better feedback
        async function generatePlaylist() {
            if (selectedMoods.length === 0 || !currentSong) return;

            showLoading(true);
            
            // Update UI to show progress
            const playlistSection = document.getElementById('playlistSection');
            const metaDiv = document.getElementById('playlistMeta');
            metaDiv.textContent = 'Analyzing song and generating recommendations...';
            playlistSection.classList.add('show');
            playlistSection.scrollIntoView({ behavior: 'smooth' });
            
            try {
                // Get recommendations using ReccoBeats backend
                const recommendations = await getRecommendations(currentSong.id, selectedMoods);
                
                if (recommendations.length === 0) {
                    metaDiv.textContent = 'Could not generate recommendations for this song. Try a different track or mood combination.';
                    showError('No recommendations available for this combination');
                    return;
                }
                
                // Build playlist (original song + recommendations)
                const playlist = [currentSong, ...recommendations];
                
                // Display playlist
                displayPlaylist(playlist);
                
            } catch (error) {
                console.error('Playlist generation failed:', error);
                metaDiv.textContent = 'Playlist generation failed. Please try again.';
                showError('Failed to generate playlist: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function displayPlaylist(playlist) {
            const tracksDiv = document.getElementById('playlistTracks');
            const metaDiv = document.getElementById('playlistMeta');
            
            tracksDiv.innerHTML = '';
            metaDiv.textContent = `${playlist.length} songs • moods: ${selectedMoods.join(', ')}`;

            playlist.forEach((track, index) => {
                const trackDiv = document.createElement('div');
                trackDiv.className = 'track-item';
                trackDiv.onclick = () => openInSpotify(track.external_urls?.spotify || '#');
                
                const artwork = track.album?.images?.length > 0 ? 
                    `<img src="${track.album.images[2]?.url || track.album.images[0]?.url}" class="track-artwork" />` :
                    `<div class="track-artwork-placeholder">🎵</div>`;
                
                // Determine mood tag based on position and selected moods
                const moodTag = index === 0 ? 'original' : selectedMoods[Math.floor(Math.random() * selectedMoods.length)];
                const moodClass = `mood-${moodTag}`;
                
                trackDiv.innerHTML = `
                    <span class="track-number">${index + 1}</span>
                    ${artwork}
                    <div class="track-info">
                        <div class="track-title">${track.name || 'Unknown Track'}</div>
                        <div class="track-artist">${track.artists?.[0]?.name || 'Unknown Artist'}</div>
                    </div>
                    <span class="mood-tag ${moodClass}">${moodTag}</span>
                `;
                
                tracksDiv.appendChild(trackDiv);
            });

            // Show playlist section
            document.getElementById('playlistSection').classList.add('show');
            document.getElementById('playlistSection').scrollIntoView({ behavior: 'smooth' });
        }

        function openInSpotify(url) {
            if (url && url !== '#') {
                window.open(url, '_blank');
            }
        }

        // Play via Spotify embed iframe
        function togglePlay() {
            if (!currentSong) return;

            const embedDiv   = document.getElementById('spotifyEmbed');
            const iframe     = document.getElementById('spotifyIframe');
            const playIcon   = document.getElementById('playIcon');

            if (embedDiv.style.display !== 'none') {
                // Hide embed (toggle off)
                embedDiv.style.display = 'none';
                iframe.src = '';
                playIcon.textContent = '▶️';
            } else {
                // Show Spotify embed — plays 30s preview without any auth
                iframe.src = `https://open.spotify.com/embed/track/${currentSong.id}?utm_source=generator&theme=0`;
                embedDiv.style.display = 'block';
                playIcon.textContent = '⏸️';
            }
        }

        function updatePlayButton(isPlaying) {
            document.getElementById('playIcon').textContent = isPlaying ? '⏸️' : '▶️';
        }

        // Utility functions
        function showLoading(show) {
            const loading = document.getElementById('loadingIndicator');
            if (show) {
                loading.classList.add('show');
            } else {
                loading.classList.remove('show');
            }
        }

        window.addEventListener('load', function() {
            authenticateSpotify();
        });
    </script>
</body>
</html>
